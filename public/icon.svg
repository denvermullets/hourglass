<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="sand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7ee8a2"/>
      <stop offset="100%" stop-color="#29be5d"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8493ac" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#414c63" stop-opacity="0.4"/>
    </linearGradient>
    <clipPath id="top-bulb">
      <path d="M156,80 L356,80 C356,80 356,200 256,240 C156,200 156,80 156,80Z"/>
    </clipPath>
    <clipPath id="bot-bulb">
      <path d="M156,432 L356,432 C356,432 356,312 256,272 C156,312 156,432 156,432Z"/>
    </clipPath>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="248" fill="#111318"/>
  <circle cx="256" cy="256" r="248" fill="none" stroke="#1f232b" stroke-width="4"/>

  <!-- Top endcap -->
  <rect x="140" y="68" width="232" height="14" rx="4" fill="#414c63"/>
  <!-- Bottom endcap -->
  <rect x="140" y="430" width="232" height="14" rx="4" fill="#414c63"/>

  <!-- Glass outline — two bulbs meeting at center -->
  <path d="M156,82 C156,82 156,210 256,248 C356,210 356,82 356,82"
        fill="url(#glass)" stroke="#647693" stroke-width="3"/>
  <path d="M156,430 C156,430 156,302 256,264 C356,302 356,430 356,430"
        fill="url(#glass)" stroke="#647693" stroke-width="3"/>

  <!-- Narrow neck -->
  <rect x="246" y="242" width="20" height="28" rx="4" fill="#414c63" opacity="0.5"/>

  <!-- Sand in top bulb (partially drained) -->
  <rect x="156" y="160" width="200" height="80" clip-path="url(#top-bulb)" fill="url(#sand)" opacity="0.85"/>

  <!-- Falling stream -->
  <rect x="253" y="230" width="6" height="50" rx="3" fill="#7ee8a2" opacity="0.7"/>

  <!-- Sand in bottom bulb (filling up) -->
  <rect x="156" y="360" width="200" height="72" clip-path="url(#bot-bulb)" fill="url(#sand)" opacity="0.9"/>

  <!-- Glass highlight/reflection -->
  <path d="M180,100 C180,100 178,180 230,218"
        fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.12"/>
  <path d="M180,412 C180,412 178,350 230,300"
        fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.08"/>
</svg>
